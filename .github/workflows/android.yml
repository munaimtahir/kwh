name: Android Debug Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Install only the command-line tools with the action.
      # We'll install packages manually to avoid list-parsing issues.
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-33
            build-tools;33.0.2

      # Manually accept licenses and install required packages.
      - name: Install SDK components
        run: |
          set -e
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --install \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --list | head -n 50

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew || true

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # Optional diagnostics in case paths are wrong
      - name: Diagnostic — verify paths
        run: |
          pwd
          ls -la
          echo "---- parent dir ----"
          ls -la ..

      # >>> Added safety step: ensure AndroidX is enabled on CI <<<
      - name: Ensure AndroidX enabled (CI safety)
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat gradle.properties

      - name: Build & Test
        run: |
          ./gradlew --version
          ./gradlew --no-daemon clean :app:test :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: apps/mobile-android/app/build/outputs/apk/debug/app-debug.apk
